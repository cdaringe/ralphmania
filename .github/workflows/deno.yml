name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type check
        run: deno check mod.ts

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium || sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXECUTABLE_PATH=$(which chromium || which chromium-browser)" >> "$GITHUB_ENV"
      - name: Run tests
        run: deno task test
